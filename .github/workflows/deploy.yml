# Autor: Leandro Xavier
# Projeto: Petcare Deployment Workflow
# Descrição: CI/CD para automação de Build, Push (GHCR) e Deploy na VPS Hostinger
# -----------------------------------------------------------------------------

name: Deploy Petcare App

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticar no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados do Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Preparar chave SSH
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${SSH_HOST:-}" ] && missing+=("HOSTINGER_SSH_HOST")
          [ -z "${SSH_USER:-}" ] && missing+=("HOSTINGER_SSH_USER")
          [ -z "${SSH_KEY:-}" ] && missing+=("HOSTINGER_SSH_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Secrets ausentes no GitHub: ${missing[*]}"
            exit 1
          fi

          install -m 700 -d .ssh
          printf '%s\n' "$SSH_KEY" > .ssh/deploy_key
          chmod 600 .ssh/deploy_key

          if ! ssh-keygen -y -f .ssh/deploy_key >/dev/null 2>&1; then
            printf '%s' "$SSH_KEY" | base64 -d > .ssh/deploy_key 2>/dev/null || true
            chmod 600 .ssh/deploy_key
          fi

          if ! ssh-keygen -y -f .ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::HOSTINGER_SSH_KEY inválida. Cole a chave privada OpenSSH completa, incluindo as linhas BEGIN/END."
            exit 1
          fi

          ssh-keyscan -H "$SSH_HOST" >> .ssh/known_hosts 2>/dev/null || true

      - name: Deploy na VPS
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          SSH_OPTS=(-i .ssh/deploy_key -o UserKnownHostsFile=.ssh/known_hosts)

          ssh "${SSH_OPTS[@]}" "$SSH_USER@$SSH_HOST" "mkdir -p /apps/petcare"
          scp "${SSH_OPTS[@]}" deploy/docker-compose.prod.yml "$SSH_USER@$SSH_HOST:/apps/petcare/docker-compose.prod.yml"

          : "${MONGODB_URI:=mongodb://172.17.0.1:27017/petcare}"

          ssh "${SSH_OPTS[@]}" "$SSH_USER@$SSH_HOST" bash -s <<REMOTE
          set -euo pipefail
          cd /apps/petcare
          mv -f docker-compose.prod.yml docker-compose.yml

          printf '%s\n' \
            "NODE_ENV=production" \
            "HOST=0.0.0.0" \
            "PORT=3000" \
            "MONGODB_URI=${MONGODB_URI}" \
            "CORS_ORIGIN=https://petcaretutor.com" \
            "DEMO_USER_ID=demo-user" \
            > .env

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          REMOTE
