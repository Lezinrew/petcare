# -----------------------------------------------------------------------------
# Autor: Leandro Xavier
# Projeto: PetCare Responsável
# Descrição: CI/CD com validação, build Docker, push GHCR e deploy na VPS
# -----------------------------------------------------------------------------

name: CI/CD PetCare

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "Executar deploy na VPS após validar e publicar a imagem"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: petcare-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "22"

jobs:
  ci:
    name: Validar aplicação
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v7

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Instalar dependências da raiz
        run: npm ci

      - name: Instalar dependências da API
        run: npm --prefix apps/api ci

      - name: Instalar dependências do Web
        run: npm --prefix apps/web ci

      - name: Verificar lint
        run: npm run lint

      - name: Verificar build
        run: npm run build

      - name: Verificar imagens do catálogo
        run: npm run check:pet-images

  docker:
    name: Build e publicação da imagem
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v7

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Autenticar no GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados do Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'))
    environment:
      name: production
      url: https://petcaretutor.com
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v7

      - name: Validar secrets de deploy
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail

          missing=()
          [ -z "${SSH_HOST:-}" ] && missing+=("HOSTINGER_SSH_HOST")
          [ -z "${SSH_USER:-}" ] && missing+=("HOSTINGER_SSH_USER")
          [ -z "${SSH_KEY:-}" ] && missing+=("HOSTINGER_SSH_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Secrets ausentes no GitHub: ${missing[*]}"
            exit 1
          fi

          install -m 700 -d .ssh
          printf '%s\n' "$SSH_KEY" > .ssh/deploy_key
          chmod 600 .ssh/deploy_key

          if ! ssh-keygen -y -f .ssh/deploy_key >/dev/null 2>&1; then
            printf '%s' "$SSH_KEY" | base64 -d > .ssh/deploy_key 2>/dev/null || true
            chmod 600 .ssh/deploy_key
          fi

          if ! ssh-keygen -y -f .ssh/deploy_key >/dev/null 2>&1; then
            {
              echo "::error title=HOSTINGER_SSH_KEY inválida::Cole uma chave privada OpenSSH completa no secret HOSTINGER_SSH_KEY."
              echo "::notice::O valor deve começar com -----BEGIN OPENSSH PRIVATE KEY----- ou ser esse mesmo conteúdo codificado em base64."
              echo "::notice::Não use a chave pública .pub, não use a senha da VPS e preserve as quebras de linha."
            }
            exit 1
          fi

          ssh-keyscan -H "$SSH_HOST" >> .ssh/known_hosts 2>/dev/null || true

      - name: Deploy na VPS
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          SSH_OPTS=(-i .ssh/deploy_key -o UserKnownHostsFile=.ssh/known_hosts)

          ssh "${SSH_OPTS[@]}" "$SSH_USER@$SSH_HOST" "mkdir -p /apps/petcare"
          scp "${SSH_OPTS[@]}" deploy/docker-compose.prod.yml "$SSH_USER@$SSH_HOST:/apps/petcare/docker-compose.prod.yml"

          : "${MONGODB_URI:=mongodb://mongo:27017/petcare}"

          ssh "${SSH_OPTS[@]}" "$SSH_USER@$SSH_HOST" "MONGODB_URI='$MONGODB_URI' GHCR_TOKEN='$GHCR_TOKEN' GHCR_USER='$GHCR_USER' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /apps/petcare
          mv -f docker-compose.prod.yml docker-compose.yml

          printf '%s\n' \
            "NODE_ENV=production" \
            "HOST=0.0.0.0" \
            "PORT=3000" \
            "MONGODB_URI=${MONGODB_URI}" \
            "CORS_ORIGIN=https://petcaretutor.com" \
            "DEMO_USER_ID=demo-user" \
            > .env

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          docker network inspect traefik-net >/dev/null 2>&1 || docker network create traefik-net
          LEGACY_API_PIDS=$(ss -tlnp | sed -n 's/.*127\.0\.0\.1:3333.*pid=\([0-9]\+\).*/\1/p' | sort -u || true)
          if [ -n "${LEGACY_API_PIDS:-}" ]; then
            echo "Stopping legacy API listener on 127.0.0.1:3333: ${LEGACY_API_PIDS}"
            kill ${LEGACY_API_PIDS} || true
            sleep 2
          fi

          docker compose pull
          docker compose up -d --remove-orphans
          docker compose exec -T petcare node dist/seed/seedDogs.js </dev/null

          SITE_FILE=$(grep -Rsl "petcaretutor.com" /etc/nginx 2>/dev/null | head -n 1 || true)
          WEB_ROOT=""
          if [ -n "${SITE_FILE:-}" ]; then
            WEB_ROOT=$(awk '$1 == "root" { gsub(";", "", $2); print $2; exit }' "$SITE_FILE")
          fi

          if [ -z "${WEB_ROOT:-}" ]; then
            for candidate in \
              /var/www/petcaretutor.com/html \
              /var/www/petcaretutor.com \
              /var/www/html \
              /usr/share/nginx/html; do
              if [ -f "$candidate/index.html" ] && grep -q "/assets/index-" "$candidate/index.html"; then
                WEB_ROOT="$candidate"
                break
              fi
            done
          fi

          echo "Nginx site file: ${SITE_FILE:-not-found}"
          echo "Nginx web root: ${WEB_ROOT:-not-found}"

          if [ -n "${WEB_ROOT:-}" ]; then
            docker cp petcare_app:/app/apps/web/dist/. "$WEB_ROOT"/
          else
            echo "::error::Raiz estática do Nginx não encontrada nos caminhos esperados."
            exit 1
          fi

          NGINX_PROXY_FILES=$(grep -RslE "127\\.0\\.0\\.1:3333|localhost:3333" /etc/nginx 2>/dev/null || true)
          if [ -n "${NGINX_PROXY_FILES:-}" ]; then
            printf '%s\n' "$NGINX_PROXY_FILES" | while read -r file; do
              sed -i.bak -E 's#http://127\.0\.0\.1:3333#http://127.0.0.1:3000#g; s#http://localhost:3333#http://127.0.0.1:3000#g' "$file"
            done
            nginx -t
            systemctl reload nginx
          fi

          docker image prune -f
          REMOTE
