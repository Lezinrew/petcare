# -----------------------------------------------------------------------------
# Autor: Leandro Xavier
# Projeto: Petcare Deployment Workflow
# Descrição: CI/CD para automação de Build, Push (GHCR) e Deploy na VPS Hostinger
# -----------------------------------------------------------------------------

name: Deploy Petcare App

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticar no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados do Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Copiar docker-compose para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          source: deploy/docker-compose.prod.yml
          target: /apps/petcare

      - name: Executar Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          envs: MONGODB_URI,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            mkdir -p /apps/petcare
            cd /apps/petcare

            if [ -f deploy/docker-compose.prod.yml ]; then
              mv -f deploy/docker-compose.prod.yml docker-compose.yml
              rmdir deploy 2>/dev/null || true
            else
              mv -f docker-compose.prod.yml docker-compose.yml
            fi

            : "${MONGODB_URI:=mongodb://172.17.0.1:27017/petcare}"

            printf '%s\n' \
              "NODE_ENV=production" \
              "HOST=0.0.0.0" \
              "PORT=3000" \
              "MONGODB_URI=${MONGODB_URI}" \
              "CORS_ORIGIN=https://petcaretutor.com" \
              "DEMO_USER_ID=demo-user" \
              > .env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
